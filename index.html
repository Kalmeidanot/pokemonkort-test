<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KortKammer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script>(function(){var t=localStorage.getItem('kortkammer_theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>

  <nav class="site-nav">
    <a href="index.html" class="nav-logo">
      <span class="logo-blue">K</span><span class="pokeball-o"></span><span class="logo-blue">rt</span><span class="logo-white">Kammer</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Hjem</a></li>
      <li><a href="set.html">Alle kort</a></li>
      <li><a href="collection.html">Samlinger</a></li>
      <li><a href="wishlist.html">Ønskeliste</a></li>
      <li><a href="#">Om oss</a></li>
    </ul>
    <div class="nav-actions">
      <button class="nav-icon-btn" title="Tema" aria-label="Bytt tema">🌙</button>
      <span id="nav-auth"></span>
    </div>
  </nav>

  <script src="auth.js?v=3"></script>

  <section class="hero">
    <div class="hero-inner">
      <div class="hero-text">
        <h1>Oppdag, saml og organiser dine favorittkort</h1>
        <p>Pokémon-inspirert nettside for samlekort, produkter og visuell profil.</p>
        <div class="hero-buttons">
          <a href="set.html" class="btn btn-primary">Se 151-kort</a>
          <a href="#" class="btn btn-secondary">Om prosjektet</a>
        </div>
      </div>
      <div class="hero-visual">
        <img
          src="https://images.pokemontcg.io/sv3pt5/logo.png"
          alt="Scarlet &amp; Violet—151"
        />
      </div>
    </div>
  </section>

  <main>
    <section class="sets-section">
      <div class="sets-inner">
        <div class="sets-section-header">
          <h2 class="sets-section-title">Tilgjengelige sett</h2>
          <select id="sets-sort" class="sort-select" aria-label="Sorter sett">
            <option value="oldest">Eldst først</option>
            <option value="newest">Nyest først</option>
          </select>
        </div>
        <div id="sets-list" class="sets-list"></div>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 KortKammer</p>
  </footer>

  <script src="sets-config.js?v=1"></script>
  <script>
    function renderSets() {
      const list = document.getElementById('sets-list');
      const sort = document.getElementById('sets-sort')?.value || 'oldest';
      if (!list || !window.KORTKAMMER_SETS) return;

      const sets = [...window.KORTKAMMER_SETS].sort((a, b) => {
        return sort === 'newest'
          ? b.releaseYear - a.releaseYear
          : a.releaseYear - b.releaseYear;
      });

      list.innerHTML = '';
      sets.forEach(set => {
        const a = document.createElement('a');
        a.href = set.href;
        a.className = 'set-card';
        a.innerHTML =
          '<div class="set-card-logo">' +
            '<img src="' + set.logo + '" alt="' + set.name + '" />' +
          '</div>' +
          '<div class="set-card-info">' +
            '<p class="set-card-name">' + set.name + '</p>' +
            '<p class="set-card-count">' + set.printedTotal + ' kort · ' + set.releaseYear + '</p>' +
            '<span class="set-card-cta">Se samling →</span>' +
          '</div>';
        list.appendChild(a);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderSets();
      document.getElementById('sets-sort')?.addEventListener('change', renderSets);
    });
  </script>
</body>
</html>
