  <title>KortKammer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script>(function(){var t=localStorage.getItem('kortkammer_theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>

  <nav class="site-nav">
    <a href="index.html" class="nav-logo">
      <span class="logo-blue">K</span><span class="pokeball-o"></span><span class="logo-blue">rt</span><span class="logo-white">Kammer</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Hjem</a></li>
      <li><a href="sets.html">Sett</a></li>
      <li><a href="collection.html">Samlinger</a></li>
      <li><a href="wishlist.html">Ønskeliste</a></li>
      <li><a href="#">Om oss</a></li>
    </ul>
    <div class="nav-actions">
      <button class="nav-icon-btn" title="Tema" aria-label="Bytt tema">🌙</button>
      <span id="nav-auth"></span>
    </div>
  </nav>

  <script src="auth.js?v=3"></script>

  <main>
    <section class="marketplace-section">
      <div class="marketplace-inner">
        <div class="marketplace-header">
          <div>
            <h1 class="marketplace-title">Aktive oppføringer</h1>
          </div>
          <div class="marketplace-filters">
            <select id="listing-type-filter" class="sort-select" aria-label="Filtrer på oppføringstype"></select>
            <select id="listing-status-filter" class="sort-select" aria-label="Filtrer på status">
              <option value="active">Aktive oppføringer</option>
              <option value="ended">Avsluttede oppføringer</option>
            </select>
          </div>
        </div>
        <div id="marketplace-listings" class="marketplace-grid"></div>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 KortKammer</p>
  </footer>
  <script src="marketplace.js?v=3"></script>
