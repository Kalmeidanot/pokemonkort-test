<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KortKammer Test</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <h1>KortKammer Test</h1>
    <p>En enkel testside for salg av Pokémon-kort</p>
    <button id="cta-btn">Se kort</button>
  </header>

  <main>
    <section class="products" id="products">
      <h2>Utvalgte kort</h2>

      <div class="card-grid">
        <article class="card-item">
          <h3>Charizard 11/108</h3>
          <p>Set: XY Evolutions</p>
          <p>Tilstand: NM</p>
          <p class="price">799 kr</p>
          <button>Kjøp interesse</button>
        </article>

        <article class="card-item">
          <h3>Blastoise 2/102</h3>
          <p>Set: Base Set</p>
          <p>Tilstand: LP</p>
          <p class="price">1299 kr</p>
          <button>Kjøp interesse</button>
        </article>

        <article class="card-item">
          <h3>Pikachu 58/102</h3>
          <p>Set: Base Set</p>
          <p>Tilstand: NM</p>
          <p class="price">249 kr</p>
          <button>Kjøp interesse</button>
        </article>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 KortKammer Test</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
